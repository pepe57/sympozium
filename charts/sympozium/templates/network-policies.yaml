{{- if .Values.networkPolicies.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-agent-deny-all
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/role: agent
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-agent-allow-eventbus
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/role: agent
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    # Allow Kubernetes API server (post-DNAT port on some CNIs like kube-router)
    - to: []
      ports:
        - protocol: TCP
          port: 6443
    {{- range .Values.networkPolicies.extraEgressPorts }}
    - to: []
      ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-sandbox-restricted
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/role: agent
      sympozium.ai/sandbox: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              sympozium.ai/role: agent
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-web-proxy-allow-ingress
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      sympozium.ai/component: web-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- range .Values.networkPolicies.extraEgressPorts }}
    - ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
{{- end }}
{{- if and .Values.networkPolicies.enabled .Values.observability.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sympozium-allow-otel
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: sympozium
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
{{- end }}
